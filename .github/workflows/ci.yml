name: CI

on:
  push:
    branches:
      - main
      - hotfix/**
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm --prefix packages/ui ci

      - name: Run type checks
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Lint UI
        run: npm run lint:ui

      - name: Build UI
        run: npm run build:ui
