name: CI

on:
  push:
    branches:
      - main
      - hotfix/**
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm --prefix packages/ui ci

      - name: Build Arc Swap
        run: npm run build:arc-swap

      - name: Run type checks
        run: npm run typecheck

      - name: Run Arc Swap tests
        run: npm run test:arc-swap

      - name: Run UI tests
        run: npm run test:ui

      - name: Lint UI
        run: npm run lint:ui

      - name: Build UI
        run: npm run build:ui

  defi-agent:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/defi-agent

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Lint Python package
        run: uv run ruff check src tests examples

      - name: Type check Python package
        run: uv run mypy src

      - name: Run Python tests
        run: uv run pytest tests
